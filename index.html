<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRID::RUNNER</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000810'/%3E%3Crect x='2' y='2' width='28' height='28' rx='1' stroke='%2300ffff' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='16' cy='16' r='5' stroke='%2300ffff' stroke-width='1.5' fill='none'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%2300ffff'/%3E%3Cline x1='4' y1='16' x2='28' y2='16' stroke='%2300ffff' stroke-width='1' opacity='.35'/%3E%3Cline x1='16' y1='4' x2='16' y2='28' stroke='%2300ffff' stroke-width='1' opacity='.35'/%3E%3C/svg%3E"
    />
    <link href="assets/fonts.css" rel="stylesheet" />
    <script src="assets/prettier-standalone.js"></script>
    <script src="assets/prettier-parser-babel.js"></script>
    <script src="assets/monaco/vs/loader.js"></script>
    <script src="menu.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --c: #00ffff;
        --cd: #00aaaa;
        --cm: #004455;
        --bg: #002b36;
        --bg2: #073642;
        --bd: rgba(0, 255, 255, 0.18);
        --tx: #839496;
        --txd: #405c64;
        --glow: 0 0 10px rgba(0, 255, 255, 0.45);
        --glowb:
          0 0 20px rgba(0, 255, 255, 0.8), 0 0 45px rgba(0, 255, 255, 0.28);
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #001a22;
        color: var(--tx);
        font-family: "JetBrains Mono", monospace;
        overflow: hidden;
        cursor: crosshair;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.04) 2px,
          rgba(0, 0, 0, 0.04) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* ── GLOBAL SCROLLBAR ── */
      ::-webkit-scrollbar {
        width: 3px;
        height: 3px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 20, 30, 0.8);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 180, 220, 0.38);
        border-radius: 0;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 220, 255, 0.62);
      }

      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
      }
      #app {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
      }
      .view {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
      }
      .view.active {
        display: flex;
      }

      /* ── BOOT ── */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 500;
        background: #000810;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 4px;
        transition: opacity 0.6s;
      }
      #boot.done {
        opacity: 0;
        pointer-events: none;
      }
      .boot-line {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--cd);
        letter-spacing: 0.1em;
        opacity: 0;
        animation: btIn 0.1s forwards;
      }
      @keyframes btIn {
        to {
          opacity: 1;
        }
      }
      #boot-logo {
        font-family: "Orbitron", sans-serif;
        font-size: 2.2rem;
        font-weight: 900;
        color: var(--c);
        text-shadow: var(--glowb);
        letter-spacing: 0.2em;
        margin-bottom: 14px;
        opacity: 0;
      }

      /* ── HOME ── */
      /* overflow-y on the view; margin:auto on content for vertical centering.
   When content < viewport → auto margins split space → true center.
   When content > viewport (search results) → margins collapse → scrollable from top. */
      #view-home {
        align-items: center;
        overflow-y: auto;
        padding: 0;
      }
      .home-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 11px;
        width: 100%;
        max-width: 720px;
        padding: 14px 10px 18px;
        margin-top: auto;
        margin-bottom: auto;
      }

      .home-hdr {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        flex-shrink: 0;
        width: 100%;
      }
      .logo {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(1.4rem, 3.4vw, 2.8rem);
        font-weight: 900;
        color: var(--c);
        text-shadow: var(--glowb);
        letter-spacing: 0.15em;
        animation: pulse 3s ease-in-out infinite;
        text-align: center;
        white-space: nowrap;
      }
      @keyframes pulse {
        0%,
        100% {
          text-shadow:
            0 0 18px rgba(0, 255, 255, 0.8),
            0 0 40px rgba(0, 255, 255, 0.25);
        }
        50% {
          text-shadow:
            0 0 30px #0ff,
            0 0 60px rgba(0, 255, 255, 0.42),
            0 0 80px rgba(0, 255, 255, 0.1);
        }
      }
      .logo-sub {
        font-family: "JetBrains Mono", monospace;
        color: var(--cd);
        font-size: clamp(0.44rem, 0.7vw, 0.68rem);
        letter-spacing: 0.14em;
        opacity: 0.55;
        text-align: center;
      }
      .vtag {
        border: 1px solid var(--cm);
        padding: 1px 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.57rem;
        color: var(--cm);
        letter-spacing: 0.16em;
      }

      /* ── SEARCH ── */
      .search-wrap {
        width: 100%;
        max-width: 520px;
        position: relative;
        flex-shrink: 0;
      }
      .search-wrap::before {
        content: "⌕";
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--cd);
        font-size: 1rem;
        pointer-events: none;
        z-index: 1;
      }
      #srch {
        width: 100%;
        background: rgba(0, 20, 35, 0.94);
        border: 1px solid var(--bd);
        color: var(--c);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.84rem;
        padding: 9px 12px 9px 32px;
        outline: none;
        letter-spacing: 0.08em;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        backdrop-filter: blur(12px);
      }
      #srch:focus {
        border-color: var(--c);
        box-shadow:
          var(--glow),
          inset 0 0 14px rgba(0, 255, 255, 0.03);
      }
      #srch::placeholder {
        color: var(--txd);
        letter-spacing: 0.12em;
      }

      /* search results */
      #srch-results {
        width: 100%;
        max-width: 720px;
        display: none;
        flex-direction: column;
        gap: 3px;
      }
      #srch-results.show {
        display: flex;
      }
      .srch-lbl {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        color: var(--txd);
        letter-spacing: 0.15em;
        padding-left: 3px;
        margin-bottom: 1px;
      }
      .srch-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 11px;
        background: rgba(0, 24, 35, 0.92);
        border: 1px solid var(--bd);
        cursor: pointer;
        transition: all 0.12s;
        min-width: 0;
      }
      .srch-row:hover,
      .srch-row.focused {
        border-color: var(--c);
        box-shadow: var(--glow);
        padding-left: 18px;
      }
      .srch-cat {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.58rem;
        color: var(--cd);
        border: 1px solid var(--cm);
        padding: 1px 6px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .srch-id {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: #93a1a1;
        white-space: nowrap;
      }
      .srch-desc {
        font-size: 0.66rem;
        color: var(--txd);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .srch-st {
        font-size: 0.62rem;
        letter-spacing: -1px;
        flex-shrink: 0;
      }
      .srch-more {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.63rem;
        color: var(--cd);
        text-align: center;
        padding: 5px;
        cursor: pointer;
        border: 1px dashed var(--cm);
        letter-spacing: 0.13em;
        transition: all 0.13s;
      }
      .srch-more:hover {
        border-color: var(--c);
        color: var(--c);
      }

      /* cat grid */
      .cat-grid-wrap {
        width: 100%;
        flex-shrink: 0;
      }
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 9px;
      }
      .cat-card {
        background: rgba(0, 24, 35, 0.9);
        border: 1px solid var(--bd);
        padding: 18px 12px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        transition: all 0.18s;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(12px);
      }
      .cat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--c);
        box-shadow: 0 0 10px var(--c);
        transform: scaleX(0);
        transition: transform 0.28s;
      }
      .cat-card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--cm), transparent);
      }
      .cat-card:hover::before,
      .cat-card.focused::before {
        transform: scaleX(1);
      }
      .cat-card:hover,
      .cat-card.focused {
        border-color: var(--c);
        box-shadow:
          var(--glow),
          inset 0 0 22px rgba(0, 255, 255, 0.04);
        transform: translateY(-2px);
      }
      .cat-icon {
        width: 38px;
        height: 38px;
        color: var(--c);
        filter: drop-shadow(0 0 7px rgba(0, 255, 255, 0.5));
      }
      .cat-name {
        font-family: "Orbitron", sans-serif;
        font-size: 0.76rem;
        font-weight: 700;
        color: var(--c);
        letter-spacing: 0.2em;
      }
      .cat-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.6rem;
        color: var(--txd);
      }

      /* ── PAGINATION ── */
      .cat-pager {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        width: 100%;
        flex-shrink: 0;
        padding: 4px 0;
      }
      .pag-arrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        color: var(--cd);
        cursor: pointer;
        padding: 3px 10px;
        border: 1px solid var(--cm);
        transition: all 0.16s;
        user-select: none;
        letter-spacing: 0.05em;
        line-height: 1;
      }
      .pag-arrow:hover {
        color: var(--c);
        border-color: var(--c);
        box-shadow: var(--glow);
      }
      .pag-arrow.disabled {
        opacity: 0.2;
        pointer-events: none;
      }
      .pag-dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .pag-dot {
        width: 6px;
        height: 6px;
        background: var(--cm);
        cursor: pointer;
        transition: all 0.18s;
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      }
      .pag-dot.active {
        background: var(--c);
        box-shadow: var(--glow);
        transform: scale(1.35);
      }
      .pag-dot:hover {
        background: var(--cd);
      }

      /* ── CATEGORY (bottom-sheet style) ── */
      #view-category {
        background: transparent;
        position: relative;
        cursor: pointer;
      }
      .cat-backdrop {
        flex: 1;
        min-height: 0;
      }
      .cat-sheet {
        background: rgba(0, 20, 32, 0.97);
        border-top: 1px solid var(--bd);
        backdrop-filter: blur(24px);
        display: flex;
        flex-direction: column;
        max-height: 62vh;
        flex-shrink: 0;
        cursor: default;
        animation: slideUp 0.32s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .sheet-handle {
        width: 36px;
        height: 3px;
        background: var(--cm);
        margin: 7px auto 4px;
        flex-shrink: 0;
        border-radius: 2px;
        opacity: 0.6;
      }
      .panel-hdr {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 6px 14px 8px;
        border-bottom: 1px solid var(--bd);
        flex-shrink: 0;
      }
      .bk {
        font-family: "JetBrains Mono", monospace;
        color: var(--cd);
        cursor: pointer;
        padding: 4px 10px;
        border: 1px solid var(--bd);
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        transition: all 0.18s;
        user-select: none;
        flex-shrink: 0;
      }
      .bk:hover {
        color: var(--c);
        border-color: var(--c);
        box-shadow: var(--glow);
      }
      .panel-title {
        font-family: "Orbitron", sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--c);
        text-shadow: var(--glow);
        letter-spacing: 0.13em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      /* ── Virtual scroll task list ── */
      .task-list {
        flex: 1;
        overflow-y: auto;
        position: relative;
        padding: 0 10px;
      }
      .task-list::-webkit-scrollbar {
        width: 3px;
      }
      .task-vspace {
        flex-shrink: 0;
      } /* total height spacer */
      .task-window {
        position: absolute;
        left: 10px;
        right: 10px;
        top: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .task-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: rgba(0, 20, 32, 0.75);
        border: 1px solid var(--bd);
        cursor: pointer;
        transition:
          border-color 0.14s,
          box-shadow 0.14s,
          background 0.14s,
          padding-left 0.14s;
        position: relative;
        animation: rowSlide 0.18s ease both;
      }
      @keyframes rowSlide {
        from {
          opacity: 0;
          transform: translateX(-8px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .task-row::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--c);
        transform: scaleY(0);
        transition: transform 0.14s;
      }
      .task-row:hover::before,
      .task-row.focused::before {
        transform: scaleY(1);
      }
      .task-row:hover,
      .task-row.focused {
        border-color: var(--c);
        box-shadow: var(--glow);
        background: rgba(0, 38, 55, 0.75);
        padding-left: 20px;
      }
      .trow-l {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .t-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--txd);
        flex-shrink: 0;
      }
      .t-dot.ok {
        background: #859900;
        box-shadow: 0 0 5px #859900;
      }
      .t-dot.ng {
        background: #dc322f;
        box-shadow: 0 0 5px #dc322f;
      }
      .t-num {
        font-family: "JetBrains Mono", monospace;
        color: var(--txd);
        font-size: 0.67rem;
        min-width: 20px;
      }
      .t-id {
        font-family: "JetBrains Mono", monospace;
        color: #93a1a1;
        font-size: 0.83rem;
      }
      .t-desc {
        font-size: 0.67rem;
        color: var(--txd);
        margin-top: 2px;
      }
      .stars-wrap {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }
      .stars {
        font-size: 0.67rem;
        letter-spacing: -1px;
      }
      .d12 {
        color: #859900;
        text-shadow: 0 0 5px #859900;
      }
      .d34 {
        color: #2aa198;
        text-shadow: 0 0 5px #2aa198;
      }
      .d56 {
        color: #b58900;
        text-shadow: 0 0 5px #b58900;
      }
      .d78 {
        color: #cb4b16;
        text-shadow: 0 0 5px #cb4b16;
      }
      .d910 {
        color: #dc322f;
        text-shadow: 0 0 5px #dc322f;
      }
      .d-lbl {
        font-family: "JetBrains Mono", monospace;
        color: var(--txd);
        font-size: 0.62rem;
      }

      /* ── TASK ── */
      #view-task {
        background: #002b36;
      }
      .task-bar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        background: rgba(0, 20, 30, 0.98);
        border-bottom: 1px solid var(--bd);
        flex-shrink: 0;
        backdrop-filter: blur(20px);
      }
      .breadc {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--txd);
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: 0.03em;
        min-width: 0;
      }
      .breadc .act {
        color: var(--c);
      }
      .tab-grp {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
      }
      .tab {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        padding: 3px 9px;
        border: 1px solid var(--bd);
        background: transparent;
        color: var(--txd);
        cursor: pointer;
        letter-spacing: 0.08em;
        transition: all 0.13s;
        white-space: nowrap;
      }
      .tab.on {
        background: rgba(0, 255, 255, 0.1);
        border-color: var(--c);
        color: var(--c);
        box-shadow: var(--glow);
      }
      .tab.sol-tab {
        border-color: rgba(181, 137, 0, 0.28);
        color: rgba(181, 137, 0, 0.55);
      }
      .tab.sol-tab:hover,
      .tab.sol-tab.on {
        background: rgba(181, 137, 0, 0.08);
        border-color: #b58900;
        color: #b58900;
        box-shadow: 0 0 7px rgba(181, 137, 0, 0.3);
      }
      .mem-grp {
        display: flex;
        align-items: center;
        gap: 3px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        color: var(--txd);
        flex-shrink: 0;
      }
      .mem-grp input {
        width: 52px;
        background: #002b36;
        border: 1px solid var(--bd);
        color: var(--c);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        padding: 3px 5px;
        text-align: center;
        outline: none;
        -moz-appearance: textfield;
      }
      .mem-grp input::-webkit-inner-spin-button,
      .mem-grp input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .run-btn {
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 5px 13px;
        background: rgba(0, 255, 255, 0.08);
        border: 1px solid var(--c);
        color: var(--c);
        cursor: pointer;
        letter-spacing: 0.18em;
        transition: all 0.13s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .run-btn:hover {
        background: rgba(0, 255, 255, 0.16);
        box-shadow: var(--glow);
      }
      .run-btn.go {
        animation: blk 0.36s ease-in-out infinite alternate;
      }
      @keyframes blk {
        from {
          opacity: 0.36;
        }
        to {
          opacity: 1;
        }
      }

      .editor-area {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      .ed-panel {
        flex: 3;
        position: relative;
        border-right: 1px solid var(--bd);
      }
      #monaco {
        position: absolute;
        inset: 0;
      }

      /* Monaco scrollbar tint */
      .monaco-scrollable-element > .scrollbar > .slider {
        background: rgba(42, 161, 152, 0.25) !important;
      }
      .monaco-scrollable-element > .scrollbar > .slider:hover {
        background: rgba(42, 161, 152, 0.45) !important;
      }
      .monaco-scrollable-element > .scrollbar > .slider:active {
        background: rgba(42, 161, 152, 0.65) !important;
      }
      .monaco-scrollable-element > .scrollbar.vertical {
        background: rgba(0, 20, 28, 0.7) !important;
      }
      .monaco-scrollable-element > .scrollbar.horizontal {
        background: rgba(0, 20, 28, 0.7) !important;
      }

      /* solutions overlay */
      .sol-overlay {
        position: absolute;
        inset: 0;
        background: #002b36;
        z-index: 10;
        display: none;
        flex-direction: column;
        overflow: hidden;
      }
      .sol-overlay.show {
        display: flex;
      }
      .sol-inner {
        flex: 1;
        overflow-y: auto;
        padding: 16px 18px;
      }
      .sol-banner {
        font-family: "JetBrains Mono", monospace;

    <!-- WORKER — runs in a separate thread; all tests are WebWorker-isolated -->
    <script id="wk" type="x/worker">
      // ── Jest-compatible mini test runner ──────────────────────────────
      function makeRunner(){
        const suites={};let curSuite='__root__';
        function describe(n,fn){curSuite=n;if(!suites[n])suites[n]=[];try{fn();}catch(e){suites[n].push({name:'(setup)',status:'error',error:e.message,time:0,mem:null});}}
        function it(name,fn){
          const s=curSuite;if(!suites[s])suites[s]=[];
          const mb=self.performance?.memory?.usedJSHeapSize??-1,t0=self.performance.now();
          try{fn();const dt=self.performance.now()-t0,ma=self.performance?.memory?.usedJSHeapSize??-1;
            suites[s].push({name,status:'pass',time:dt,mem:ma>=0?ma-mb:null});}
          catch(e){suites[s].push({name,status:'fail',error:e.message,time:self.performance.now()-t0,mem:null});}
        }
        const test=it;
        function expect(v){
          function a(ok,msg){if(!ok)throw new Error(msg);}
          const m={
            toBe:(e)=>a(Object.is(v,e),'Expected '+JSON.stringify(e)+' got '+JSON.stringify(v)),
            toEqual:(e)=>a(JSON.stringify(v)===JSON.stringify(e),'exp '+JSON.stringify(e)+' got '+JSON.stringify(v)),
            toStrictEqual:(e)=>a(JSON.stringify(v)===JSON.stringify(e),'toStrictEqual failed'),
            toMatch:(r)=>{const re=typeof r==='string'?new RegExp(r):r;a(re.test(String(v)),'toMatch failed');},
            toBeTruthy:()=>a(!!v,'Expected truthy'),toBeFalsy:()=>a(!v,'Expected falsy'),
            toBeNull:()=>a(v===null,'Expected null'),toBeUndefined:()=>a(v===undefined,'Expected undefined'),
            toBeDefined:()=>a(v!==undefined,'Expected defined'),
            toContain:(i)=>a(Array.isArray(v)?v.includes(i):String(v).includes(String(i)),'toContain failed'),
            toHaveLength:(n)=>a(v!=null&&v.length===n,'Expected length '+n+' got '+(v?.length??'N/A')),
            toBeGreaterThan:(n)=>a(v>n,v+'>'+n+' failed'),toBeLessThan:(n)=>a(v<n,v+'<'+n+' failed'),
            toBeGreaterThanOrEqual:(n)=>a(v>=n,v+'>='+n+' failed'),toBeLessThanOrEqual:(n)=>a(v<=n,v+'<='+n+' failed'),
            toThrow:()=>{try{v();a(false,'Expected to throw');}catch(e){}}
          };
          m.not={};Object.keys(m).forEach(k=>{if(k==='not')return;
            m.not[k]=(...args)=>{let ok=false;try{m[k](...args);}catch(e){ok=true;}
              if(!ok)throw new Error('NOT expected: '+k);};});
          return m;
        }
        return{suites,describe,it,test,expect};
      }

      // ── Single run ────────────────────────────────────────────────────
      function singleRun(sol,spec){
        const{suites,describe,it,test,expect}=makeRunner();
        const t0=self.performance.now();
        let ex;
        try{const mod={exports:{}};new Function('module','exports','require',sol)(mod,mod.exports,()=>mod.exports);ex=mod.exports;}
        catch(err){return{error:'SYNTAX/RUNTIME:\n'+err.message,suites:{},total:0};}
        try{new Function('describe','it','test','expect','f','require',spec)(describe,it,test,expect,ex,()=>ex);}
        catch(err){if(!suites['__root__'])suites['__root__']=[];suites['__root__'].push({name:'spec error',status:'error',error:err.message,time:0,mem:null});}
        return{suites,total:self.performance.now()-t0};
      }

      // ── Benchmark: run up to maxRuns times, stop at timeLimit ms ──────
      // Returns {minTime, runs, suites (last run)}
      function benchmark(sol,spec,maxRuns,timeLimit){
        const wallStart=self.performance.now();
        let minTime=Infinity,runs=0,lastResult=null;
        while(runs<maxRuns&&(self.performance.now()-wallStart)<timeLimit){
          const r=singleRun(sol,spec);
          if(r.error) return{error:r.error};
          const all=Object.values(r.suites).flat();
          const totalTime=all.reduce((a,t)=>a+t.time,0);
          if(totalTime<minTime) minTime=totalTime;
          lastResult=r;
          runs++;
        }
        return{minTime,runs,suites:lastResult?.suites||{},total:lastResult?.total||0};
      }

      self.onmessage=function(e){
        const{sol,spec,mode,refSol,maxRuns,timeLimit}=e.data;

        if(mode==='benchmark'){
          // benchmark both ref and user, return minTimes
          const refB=benchmark(refSol,spec,maxRuns,timeLimit);
          if(refB.error){self.postMessage({error:'REF ERROR: '+refB.error});return;}
          self.postMessage({type:'ref_done',refRuns:refB.runs,refMinTime:refB.minTime});

          const userB=benchmark(sol,spec,maxRuns,timeLimit);
          if(userB.error){self.postMessage({error:'USER ERROR: '+userB.error});return;}
          self.postMessage({
            type:'bench_done',
            suites:userB.suites,total:userB.total,
            userMinTime:userB.minTime,userRuns:userB.runs,
            refMinTime:refB.minTime,refRuns:refB.runs,
          });
        } else {
          // normal single run
          const r=singleRun(sol,spec);
          self.postMessage(r);
        }
      };
    </script>

      function resize() {

      resize();

      function lcg(seed) {
        let s = seed >>> 0;
        return () => {
          s = (1664525 * s + 1013904223) >>> 0;
          return s / 4294967296;
        };
      }
      const rnd = lcg(0xcafe1234);
      const STARS = Array.from({ length: 120 }, () => ({
        x: rnd(),
        y: rnd() * 0.44,
        sz: rnd() < 0.14 ? 1.5 : 1,
        ph: rnd() * Math.PI * 2,
        sp: 0.28 + rnd() * 0.48,
      }));

      function drawBg(t) {
        const W = cv.width,
          H = cv.height;
        const sky = cx.createLinearGradient(0, 0, 0, H * 0.56);
        sky.addColorStop(0, "#000005");
        sky.addColorStop(0.75, "#000a10");
        sky.addColorStop(1, "#001420");
        cx.fillStyle = sky;
        cx.fillRect(0, 0, W, H);
        const gnd = cx.createLinearGradient(0, H * 0.5, 0, H);
        gnd.addColorStop(0, "#000d18");
        gnd.addColorStop(1, "#000208");
        cx.fillStyle = gnd;
        cx.fillRect(0, H * 0.5, W, H * 0.5);
        const hg = cx.createLinearGradient(0, H * 0.43, 0, H * 0.62);
        hg.addColorStop(0, "rgba(0,80,140,0)");
        hg.addColorStop(0.5, "rgba(0,180,220,.1)");
        hg.addColorStop(1, "rgba(0,80,140,0)");
        cx.fillStyle = hg;
        cx.fillRect(0, H * 0.43, W, H * 0.22);
        cx.save();
        STARS.forEach((s) => {
          const fl = 0.3 + 0.7 * Math.abs(Math.sin(t * s.sp + s.ph));
          cx.fillStyle = `rgba(160,220,255,${fl * 0.5})`;
          cx.fillRect(s.x * W, s.y * H, s.sz, s.sz);
        });
        cx.restore();
        drawGrid(W, H, t);
        if (Math.random() < 0.0038) lightnings.push(mkLightning(W, H));
        cx.save();
        lightnings = lightnings.filter((l) => l.a > 0.01);
        lightnings.forEach((l) => {
          l.a -= l.dk;
          drawLP(l.pts, 1.4, l.a * 0.88);
          l.br.forEach((b) => drawLP(b, 0.65, l.a * 0.36));
          if (l.a > 0.65) {
            cx.fillStyle = `rgba(100,170,255,${(l.a - 0.65) * 0.07})`;
            cx.fillRect(0, 0, W, H);
          }
        });
        cx.restore();
      }
      function drawGrid(W, H, t) {
        const hz = H * 0.5,
          vpX = W * 0.5,
          NV = 26,
          dz = 1,
          spd = 0.52,
          scroll = (t * spd) % dz,
          maxN = 32;
        // ── GRID_SPREAD controls how wide the infinite plane appears.
        // 0.0 = road-narrow,  0.8 = moderate (default),  2.0+ = extremely wide.
        // Increase to push vertical lines further beyond screen edges.
        const GRID_SPREAD = 0.8;
        const BL = -W * GRID_SPREAD;
        const BR = W * (1 + GRID_SPREAD);
        cx.save();
        cx.beginPath();
        cx.rect(0, hz, W, H - hz + 2);
        cx.clip();
        for (let i = 0; i <= NV; i++) {
          const bx = BL + (i / NV) * (BR - BL),
            isMid = i === NV / 2;
          cx.beginPath();
          cx.moveTo(vpX, hz);
          cx.lineTo(bx, H + 4);
          cx.strokeStyle = `rgba(0,200,255,${isMid ? 0.5 : 0.14})`;
          cx.lineWidth = isMid ? 1.2 : 0.55;
          cx.stroke();
        }
        const C = (H - hz) * dz;
        for (let n = 1; n <= maxN; n++) {
          const wz = n * dz - scroll;
          if (wz <= 0.01) continue;
          const y = hz + C / wz;
          if (y <= hz + 0.5 || y > H + 4) continue;
          const frac = (y - hz) / (H - hz);
          const lx = vpX + (BL - vpX) * frac,
            rx = vpX + (BR - vpX) * frac;
          const alpha = Math.min(0.42, frac * frac * 1.8);
          cx.beginPath();
          cx.moveTo(lx, y);
          cx.lineTo(rx, y);
          cx.strokeStyle = `rgba(0,200,255,${alpha})`;
          cx.lineWidth = 0.55;
          cx.stroke();
        }
        const hgl = cx.createLinearGradient(0, hz - 2, 0, hz + 7);
        hgl.addColorStop(0, "rgba(0,200,255,0)");
        hgl.addColorStop(0.5, "rgba(0,200,255,.17)");
        hgl.addColorStop(1, "rgba(0,200,255,0)");
        cx.fillStyle = hgl;
        cx.fillRect(0, hz - 2, W, 9);
        cx.restore();
      }
      function mkLightning(W, H) {
        const x = rnd() * W,
          y0 = rnd() * H * 0.22,
          y1 = y0 + 50 + rnd() * 100;
        const pts = [{ x, y: y0 }];
        let cx2 = x,
          cy = y0;
        while (cy < y1) {
          cy += 7 + rnd() * 13;
          cx2 += (rnd() - 0.5) * 33;
          pts.push({ x: cx2, y: cy });
        }
        const br = [];
        if (pts.length > 2 && rnd() > 0.52) {
          const bi = Math.floor(pts.length * 0.4);
          let bx = pts[bi].x,
            by = pts[bi].y;
          const bp = [{ x: bx, y: by }];
          for (let i = 0; i < 3 + Math.floor(rnd() * 4); i++) {
            by += 5 + rnd() * 9;
            bx += (rnd() - 0.5) * 23;
            bp.push({ x: bx, y: by });
          }
          br.push(bp);
        }
        return { pts, br, a: 1, dk: 0.046 + rnd() * 0.05 };

        cx.strokeStyle = `rgba(160,212,255,${a})`;
        cx.lineWidth = w;
        cx.shadowBlur = 10;
        cx.shadowColor = "#55aaff";
        cx.stroke();
        cx.shadowBlur = 0;

        if (!cat.tasks.length) {

        const lastIdx = Math.min(
          tasks.length - 1,
          Math.ceil((scrollTop + viewH) / ROW_H) + ROW_OVER,
        );

        win.style.top = firstIdx * ROW_H + 6 + "px";
        win.innerHTML = "";

        for (let i = firstIdx; i <= lastIdx; i++) {
          const t = tasks[i];
          const st = STATUS[`${_vsCat.id}/${t.id}`] || "";
          const dc = diffCls(t.diff);
          const row = document.createElement("div");
          row.className = "task-row" + (i === focusTaskIdx ? " focused" : "");
          // Animate from top, short stagger (max 200ms so list feels snappy)
          row.style.animationDelay = Math.min((i - firstIdx) * 18, 200) + "ms";
          row.dataset.idx = i;
          row.innerHTML = `<div class="trow-l">
      <div class="t-dot${st === "ok" ? " ok" : st === "ng" ? " ng" : ""}"></div>
      <div class="t-num">${String(i + 1).padStart(2, "0")}.</div>
      <div><div class="t-id">${t.id.toUpperCase()}</div><div class="t-desc">${t.desc}</div></div>
    </div>
    <div class="stars-wrap"><span class="stars ${dc}">${mkStars(t.diff)}</span><span class="d-lbl">(${t.diff}/10)</span></div>`;
          row.onclick = () => {
            playNav();
            openTask(_vsCat, t);
          };
          win.appendChild(row);
        }
      }
      function mkStars(d) {
        let s = "";
        for (let i = 1; i <= 10; i++) s += i <= d ? "★" : "☆";
        return s;
      }
      function diffCls(d) {
        return d <= 2
          ? "d12"
          : d <= 4
            ? "d34"
            : d <= 6
              ? "d56"
              : d <= 8
                ? "d78"
                : "d910";
      }
      document.getElementById("bk-cat").onclick = (e) => {
        e.stopPropagation();
        playClick();
        showView("home");
      };

      // ═══════════ TASK ═══════════
      async function openTask(cat, task) {
        curCat = cat;
        curTask = task;
        curTab = "ed";
        document.getElementById("breadc").innerHTML =
          `<span>${cat.name}</span> <span style="color:var(--txd)">/</span> <span class="act">${task.id.toUpperCase()}</span>`;
        setTabs("ed");
        hideSolOverlay();
        clearResults();
        setStatus("⟳ Loading…");
        showView("task");
        _editorLoading = true;
        if (editor) {
          editor.setValue("// Loading…");
          editor.updateOptions({ readOnly: true });
        }
        const files = await loadTask(cat, task);
        _editorLoading = false;
        const key = `${cat.id}/${task.id}`;
        solCode = CODE[key] !== undefined ? CODE[key] : files.code;
        if (editor) {
          editor.setValue(solCode);
          editor.updateOptions({ readOnly: false });
          editor.focus();
        }
        setStatus("");
      }
      function setTabs(t) {
        document.getElementById("tab-ed").classList.toggle("on", t === "ed");
        document.getElementById("tab-sp").classList.toggle("on", t === "sp");
        document.getElementById("tab-sol").classList.toggle("on", t === "sol");
      }
      function switchTab(t) {
        playClick();
        curTab = t;
        setTabs(t);
        hideSolOverlay();
        if (!editor || !curTask) return;
        const files = FILECACHE[`${curCat.id}/${curTask.id}`];
        _editorLoading = true;
        if (t === "ed") {
          editor.setValue(solCode);
          editor.updateOptions({ readOnly: false });
          editor.focus();
        } else if (files) {
          editor.setValue(files.spec || "// spec not loaded");
          editor.updateOptions({ readOnly: true });
        }
        _editorLoading = false;
      }
      function hideSolOverlay() {
        document.getElementById("sol-overlay").classList.remove("show");
      }
      function requestSolutions() {
        playClick();
        if (!curTask) return;
        document.getElementById("modal").classList.remove("hide");
      }
      function closeModal() {
        playClick();
        document.getElementById("modal").classList.add("hide");
      }
      function doShowSolution() {
        playClick();
        closeModal();
        const files = FILECACHE[`${curCat.id}/${curTask.id}`];
        setTabs("sol");
        document.getElementById("sol-code").textContent =
          files?.sol ||
          "// No reference solution available.\n// Run build.sh to generate task files.";
        document.getElementById("sol-note").textContent = files?.sol
          ? `// grid/${curCat.folder}/${curTask.file}.sol.js`
          : "";
        document.getElementById("sol-overlay").classList.add("show");
      }
      document.getElementById("bk-task").onclick = () => {
        playClick();
        if (editor && curTask && !_editorLoading) {
          solCode = editor.getValue();
          CODE[`${curCat.id}/${curTask.id}`] = solCode;
        }
        closeMobResults();
        hideSolOverlay();
        showView("category");
      };
      document.getElementById("modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      // ═══════════ MONACO — DARK SOLARIZED ═══════════
      require.config({ paths: { vs: "assets/monaco/vs" } });
      require(["vs/editor/editor.main"], function () {
        monaco.editor.defineTheme("solarized-dark", {
          base: "vs-dark",
          inherit: false,
          rules: [
            { token: "", foreground: "839496", background: "002b36" },
            { token: "keyword", foreground: "859900", fontStyle: "bold" },
            { token: "keyword.operator", foreground: "657b83" },
            { token: "string", foreground: "2aa198" },
            { token: "string.escape", foreground: "cb4b16" },
            { token: "comment", foreground: "586e75", fontStyle: "italic" },
            { token: "number", foreground: "d33682" },
            { token: "regexp", foreground: "cb4b16" },
            { token: "regexp.escape", foreground: "dc322f" },
            { token: "delimiter", foreground: "586e75" },
            { token: "delimiter.curly", foreground: "657b83" },
            { token: "delimiter.paren", foreground: "657b83" },
            { token: "delimiter.square", foreground: "657b83" },
            { token: "type", foreground: "268bd2" },
            { token: "variable", foreground: "839496" },
            { token: "identifier", foreground: "268bd2" },
            { token: "constant", foreground: "b58900" },
            { token: "function", foreground: "268bd2" },
          ],
          colors: {
            "editor.background": "#002b36",
            "editor.foreground": "#839496",
            "editorCursor.foreground": "#2aa198",
            "editor.lineHighlightBackground": "#073642",
            "editor.selectionBackground": "#073642",
            "editor.inactiveSelectionBackground": "#03303a",
            "editorLineNumber.foreground": "#405c64",
            "editorLineNumber.activeForeground": "#839496",
            "editorGutter.background": "#002028",
            "editorIndentGuide.background": "#073642",
            "editorIndentGuide.activeBackground": "#586e75",
            "editorWidget.background": "#002b36",
            "editorWidget.border": "#073642",
            "editorSuggestWidget.background": "#002b36",
            "editorSuggestWidget.border": "#073642",
            "editorSuggestWidget.selectedBackground": "#073642",
            "editorSuggestWidget.foreground": "#839496",
            "editorSuggestWidget.highlightForeground": "#2aa198",
            "list.hoverBackground": "#073642",
            "list.activeSelectionBackground": "#073642",
            "list.activeSelectionForeground": "#93a1a1",
            "scrollbarSlider.background": "rgba(42,161,152,.22)",
            "scrollbarSlider.hoverBackground": "rgba(42,161,152,.42)",
            "scrollbarSlider.activeBackground": "rgba(42,161,152,.62)",
            "editor.findMatchBackground": "rgba(181,137,0,.3)",
            "editor.findMatchHighlightBackground": "rgba(181,137,0,.15)",
            "editorBracketMatch.background": "rgba(0,200,200,.18)",
            "editorBracketMatch.border": "#00cccc",
          },
        });
        editor = monaco.editor.create(document.getElementById("monaco"), {
          value: "",
          language: "javascript",
          theme: "solarized-dark",
          fontSize: 14,
          fontFamily: '"JetBrains Mono",monospace',
          fontWeight: "bold",
          fontLigatures: true,
          lineNumbers: "on",
          minimap: { enabled: false },
          scrollBeyondLastLine: false,
          automaticLayout: true,
          tabSize: 2,
          renderWhitespace: "selection",
          cursorBlinking: "smooth",
          cursorStyle: "line",
          cursorWidth: 2,
          smoothScrolling: true,
          padding: { top: 13, bottom: 13 },
          wordWrap: "on",
          contextmenu: true,
          fixedOverflowWidgets: true,
          scrollbar: { verticalScrollbarSize: 3, horizontalScrollbarSize: 3 },
        });
        editor.onDidChangeModelContent(() => {
          if (!_editorLoading && curTab === "ed" && curTask) {
            solCode = editor.getValue();
            CODE[`${curCat.id}/${curTask.id}`] = solCode;
          }
          if (!_editorLoading) playType();
        });
        if (curTask && !_editorLoading) {
          editor.setValue(solCode);
          editor.updateOptions({ readOnly: false });
        }
      });

      // ═══════════ PRETTIER ═══════════
      function fmt(code) {
        try {
          if (typeof prettier === "undefined")
            return { ok: false, err: "prettier not loaded" };
          const plugins = [];
          if (typeof prettierPlugins !== "undefined" && prettierPlugins.babel)
            plugins.push(prettierPlugins.babel);
          if (!plugins.length)
            return { ok: false, err: "babel plugin missing" };
          return {
            ok: true,
            code: prettier.format(code, {
              parser: "babel",
              plugins,
              printWidth: 80,
              tabWidth: 2,
              singleQuote: true,
              trailingComma: "es5",
              semi: true,
            }),
          };
        } catch (e) {
          return { ok: false, err: e.message };
        }
      }

      // ═══════════ WORKER ═══════════
      function getWkUrl() {
        if (!wkBlob) {
          const src = document.getElementById("wk").textContent;
          wkBlob = URL.createObjectURL(
            new Blob([src], { type: "application/javascript" }),
          );
        }
        return wkBlob;
      }
      function runWorker(sol, spec) {
        return new Promise((res) => {
          const w = new Worker(getWkUrl());
          const tid = setTimeout(() => {
            w.terminate();
            res({ error: "TIMEOUT (10s)", suites: {}, total: 10000 });
          }, 10000);
          w.onmessage = (e) => {
            clearTimeout(tid);
            w.terminate();
            res(e.data);
          };
          w.onerror = (e) => {
            clearTimeout(tid);
            w.terminate();
            res({ error: "Worker: " + e.message, suites: {}, total: 0 });
          };
          w.postMessage({ sol, spec });
        });
      }

      // ═══════════ MOBILE RESULTS SHEET ═══════════
      function isMobile() {
        return window.innerWidth <= 680;
      }
      function openMobResults() {
        if (isMobile())
          document.getElementById("res-panel").classList.add("mob-open");
      }
      function closeMobResults() {
        document.getElementById("res-panel").classList.remove("mob-open");
      }

      // ═══════════ FORMAT & RUN ═══════════
      async function formatAndRun() {
        if (!curTask || view !== "task") return;
        const key = `${curCat.id}/${curTask.id}`;
        const files = FILECACHE[key];
        if (!files) {
          setStatus("⚠ Files not loaded", "err");
          return;
        }
        playRunStart();
        if (curTab !== "ed") switchTab("ed");
        const btn = document.getElementById("run-btn");
        btn.classList.add("go");
        btn.textContent = "⟳ RUNNING";
        let code = editor ? editor.getValue() : solCode;
        setStatus("⟳ Formatting...");
        const f = fmt(code);
        if (f.ok) {
          code = f.code;
          solCode = code;
          CODE[key] = code;
          _editorLoading = true;
          if (editor) {
            const pos = editor.getPosition();
            editor.setValue(code);
            if (pos) editor.setPosition(pos);
          }
          _editorLoading = false;
          setStatus("✓ Formatted", "ok");
        } else {
          setStatus("⚠ Format skipped: " + f.err.split("\n")[0], "err");
        }
        document.getElementById("res-body").innerHTML =
          `<div class="res-empty"><div style="font-size:1.2rem;animation:blk .36s infinite alternate">⟳</div><div>EXECUTING...</div></div>`;
        document.getElementById("res-sum").innerHTML = "";
        const r = await runWorker(code, files.spec);

        // ── Strict mode: multi-run benchmark ──────────────────────────
        let benchData = null;
        if (_strictOn && files.sol && !r.error) {
          const MAX_RUNS = 100,
            TIME_LIMIT = 5000;
          setStatus("⚡ STRICT — benchmarking reference…");
          btn.textContent = "⟳ REF";
          benchData = await runBenchmark(
            files.sol,
            code,
            files.spec,
            MAX_RUNS,
            TIME_LIMIT,
            () => {
              setStatus("⚡ STRICT — benchmarking your solution…");
              btn.textContent = "⟳ USR";
            },
          );
        }

        btn.classList.remove("go");
        btn.textContent = "▶ RUN";
        renderResults(r, benchData);
        openMobResults();
        if (!r.error) {
          const all = Object.values(r.suites).flat();
          const st =
            all.length > 0 && all.every((t) => t.status === "pass")
              ? "ok"
              : all.some((t) => t.status !== "pass")
                ? "ng"
                : "";
          if (st) STATUS[key] = st;
          if (st === "ok") playAllPass();
          else if (st === "ng") playFail();
        } else playError();
        setStatus("");
      }

      // ── Multi-run benchmark dispatcher ──────────────────────────────
      function runBenchmark(
        refSol,
        userSol,
        spec,
        maxRuns,
        timeLimit,
        onUserPhase,
      ) {
        return new Promise((res) => {
          const w = new Worker(getWkUrl());
          const dead = setTimeout(
            () => {
              w.terminate();
              res(null);
            },
            timeLimit * 2 + 4000,
          );
          w.onmessage = (e) => {
            const d = e.data;
            if (!d || d.error) {
              clearTimeout(dead);
              w.terminate();
              res(null);
              return;
            }
            if (d.type === "ref_done") {
              onUserPhase && onUserPhase();
              return;
            }
            if (d.type === "bench_done") {
              clearTimeout(dead);
              w.terminate();
              res({
                userMinTime: d.userMinTime,
                userRuns: d.userRuns,
                refMinTime: d.refMinTime,
                refRuns: d.refRuns,
              });
            }
          };
          w.onerror = () => {
            clearTimeout(dead);
            w.terminate();
            res(null);
          };
          w.postMessage({
            mode: "benchmark",
            sol: userSol,
            refSol,
            spec,
            maxRuns,
            timeLimit,
          });
        });
      }

      // ═══════════ RENDER ═══════════
      function renderResults(r, benchData) {
        const body = document.getElementById("res-body"),
          sum = document.getElementById("res-sum");
        if (r.error) {
          body.innerHTML = `<div style="padding:11px"><div style="color:#dc322f;font-family:'JetBrains Mono',monospace;font-size:.74rem;border-left:2px solid #dc322f;padding-left:9px"><div style="margin-bottom:3px;color:#cb4b16">⚠ ERROR</div><div style="white-space:pre-wrap;color:#a93020">${esc(r.error)}</div></div></div>`;
          sum.innerHTML = `<span class="bf">✗ ERROR</span>`;
          return;
        }
        const suites = r.suites || {},
          all = Object.values(suites).flat();
        const pass = all.filter((t) => t.status === "pass").length,
          fail = all.filter((t) => t.status !== "pass").length;
        const mems = all.map((t) => t.mem).filter((m) => m != null);
        const totalMem = mems.length ? mems.reduce((a, b) => a + b, 0) : null;
        const memStr = totalMem != null ? fmtB(totalMem) : "";

        // Strict banner (STRICT_TOLERANCE = 10%)
        let strictBanner = "";
        if (_strictOn && benchData) {
          const { userMinTime, userRuns, refMinTime, refRuns } = benchData;
          const TOLS = 0.1; // 10% tolerance
          const ratio =
            refMinTime > 0 ? (userMinTime - refMinTime) / refMinTime : 0;
          const ok = ratio <= TOLS;
          const color = ok ? "#859900" : "#dc322f";
          strictBanner = `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px;padding:5px 9px 6px;font-family:'JetBrains Mono',monospace;font-size:.64rem;border-bottom:1px solid var(--bd);flex-shrink:0;background:rgba(0,0,0,.2)">
      <span style="color:${color};font-weight:bold;letter-spacing:.08em">⚡ ${ok ? "STRICT PASS" : "STRICT FAIL"}</span>
      <span style="color:var(--txd)">user min:</span><span style="color:${color}">${userMinTime.toFixed(3)}ms ×${userRuns}</span>
      <span style="color:var(--txd)">ref min:</span><span style="color:#2aa198">${refMinTime.toFixed(3)}ms ×${refRuns}</span>
      <span style="color:var(--txd)">delta:</span><span style="color:${color}">${ratio >= 0 ? "+" : ""}${(ratio * 100).toFixed(1)}% (limit +${(TOLS * 100).toFixed(0)}%)</span>
    </div>`;
        } else if (
          _strictOn &&
          !benchData &&
          files &&
          FILECACHE[`${curCat.id}/${curTask.id}`]?.sol == null
        ) {
          strictBanner = `<div style="padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--txd);border-bottom:1px solid var(--bd)">⚡ STRICT: no .sol.js found — skipped</div>`;
        }

        sum.innerHTML = `<span class="bp">✓ ${pass}</span>${fail ? `<span class="bf"> ✗ ${fail}</span>` : ""}<span class="bt">${(r.total || 0).toFixed(2)}ms</span>${memStr ? `<span class="bt" style="color:#2aa198">${memStr}</span>` : ""}`;
        if (!all.length) {
          body.innerHTML =
            strictBanner +
            `<div class="res-empty"><div>NO TESTS FOUND</div></div>`;
          return;
        }
        let h = "";
        Object.entries(suites).forEach(([sn, tests]) => {
          if (!tests?.length) return;
          h += `<div class="r-suite">`;
          if (sn !== "__root__")
            h += `<div class="r-suite-nm">${esc(sn)}</div>`;
          tests.forEach((t) => {
            const memD =
              t.mem != null ? (t.mem >= 0 ? "+" : "") + fmtB(t.mem) : "";
            h += `<div class="r-item ${t.status}"><div class="r-nr">
        <span class="r-ico">${t.status === "pass" ? "●" : "✗"}</span><span class="r-nm">${esc(t.name)}</span>
        <span class="r-ms">${t.time.toFixed(2)}ms</span>${memD ? `<span class="r-mem" style="color:#2aa198">${memD}</span>` : ""}
      </div>${t.error ? `<div class="r-err">${esc(t.error)}</div>` : ""}</div>`;
          });
          h += `</div>`;
        });
        body.innerHTML = strictBanner + h;
      }
      function clearResults() {
        document.getElementById("res-body").innerHTML =
          `<div class="res-empty"><div class="ico">⬡</div><div>AWAITING EXECUTION</div><div style="opacity:.28;font-size:.62rem;margin-top:3px">▶ RUN</div></div>`;
        document.getElementById("res-sum").innerHTML = "";
      }
      function setStatus(msg, cls = "") {
        const el = document.getElementById("statusbar");
        el.textContent = msg;
        el.className = "statusbar" + (cls ? " " + cls : "");
      }
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function fmtB(b) {
        if (Math.abs(b) < 1024) return b + "B";
        if (Math.abs(b) < 1048576) return (b / 1024).toFixed(1) + "KB";
        return (b / 1048576).toFixed(1) + "MB";
      }

      // ═══════════ KEYBOARD ═══════════
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "s") {
          e.preventDefault();
          if (TEST_ON_SAVE && view === "task") formatAndRun();
          return;
        }

        if (e.key === "Escape") {
          if (!document.getElementById("modal").classList.contains("hide")) {
            closeModal();
            return;
          }
          if (view === "task") {
            playClick();
            document.getElementById("bk-task").click();
            return;
          }
          if (view === "category") {
            playClick();
            showView("home");
            return;
          }
          return;
        }

        // F → focus search (home view only, when not already in input)
        if (
          (e.key === "f" || e.key === "F") &&
          view === "home" &&
          e.target !== document.getElementById("srch") &&
          !e.ctrlKey &&
          !e.metaKey
        ) {
          e.preventDefault();
          document.getElementById("srch").focus();
          return;
        }

        // Don't intercept when typing in search or editor
        if (e.target === document.getElementById("srch")) return;
        if (
          view === "task" &&
          document.activeElement &&
          document.getElementById("monaco").contains(document.activeElement)
        )
          return;

        const isUp = e.key === "ArrowUp" || e.key === "w" || e.key === "W";
        const isDown = e.key === "ArrowDown" || e.key === "s" || e.key === "S";
        const isLeft = e.key === "ArrowLeft" || e.key === "a" || e.key === "A";
        const isRight =
          e.key === "ArrowRight" || e.key === "d" || e.key === "D";
        const isEnter = e.key === "Enter";

        if (view === "home") {
          const cards = document
            .getElementById("cat-grid")
            .querySelectorAll(".cat-card");
          if (!cards.length) return;
          const cols = 3,
            max = cards.length - 1;
          if (isRight) {
            e.preventDefault();
            focusCatIdx = Math.min(focusCatIdx + 1, max);
          } else if (isLeft) {
            e.preventDefault();
            focusCatIdx = Math.max(focusCatIdx - 1, 0);
          } else if (isDown) {
            e.preventDefault();
            focusCatIdx = Math.min(focusCatIdx + cols, max);
          } else if (isUp) {
            e.preventDefault();
            focusCatIdx = Math.max(focusCatIdx - cols, 0);
          } else if (isEnter && focusCatIdx >= 0) {
            e.preventDefault();
            cards[focusCatIdx].click();
            return;
          } else return;
          if (focusCatIdx < 0) focusCatIdx = 0;
          cards.forEach((c, i) =>
            c.classList.toggle("focused", i === focusCatIdx),
          );
          cards[focusCatIdx].scrollIntoView({ block: "nearest" });
          return;
        }
        if (view === "category") {
          const rows = document
            .getElementById("task-list")
            .querySelectorAll(".task-row");
          if (!rows.length) return;
          if (isDown || isRight) {
            e.preventDefault();
            focusTaskIdx = Math.min(focusTaskIdx + 1, rows.length - 1);
          } else if (isUp || isLeft) {
            e.preventDefault();
            focusTaskIdx = Math.max(focusTaskIdx - 1, 0);
          } else if (isEnter && focusTaskIdx >= 0) {
            e.preventDefault();
            rows[focusTaskIdx].click();
            return;
          } else return;
          if (focusTaskIdx < 0) focusTaskIdx = 0;
          rows.forEach((r, i) =>
            r.classList.toggle("focused", i === focusTaskIdx),
          );
          rows[focusTaskIdx].scrollIntoView({ block: "nearest" });
          return;
        }
      });
    </script>
  </body>
</html>
